name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Verify Azure Static Web Apps configuration
        run: >-
          node -e "const config = require('./dist/pmark-pt-app/browser/staticwebapp.config.json');
          if (config.platform?.apiRuntime !== 'node:22')
          throw new Error('Expected platform.apiRuntime to be node:22; received ' +
          JSON.stringify(config.platform?.apiRuntime));"

      - name: Deploy to Azure Static Web Apps
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_WATER_0E5CBDB03 }}
        run: |
          npx --yes @azure/static-web-apps-cli@2.0.9 deploy \
            ./dist/pmark-pt-app/browser \
            --api-location ./api \
            --swa-config-location ./dist/pmark-pt-app/browser \
            --api-language node \
            --api-version 22 \
            --env production
