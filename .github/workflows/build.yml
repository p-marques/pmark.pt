name: Build

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: read

jobs:
  build:
    name: Verify Application Builds
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build